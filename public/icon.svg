<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1f20"/>
      <stop offset="100%" stop-color="#131314"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Metronome body (trapezoid outline) -->
  <path d="M 186 108 L 326 108 L 370 408 L 142 408 Z"
        fill="none"
        stroke="#FFB300"
        stroke-width="20"
        stroke-linejoin="round"/>

  <!-- Tick marks on body -->
  <line x1="204" y1="210" x2="308" y2="210" stroke="#514532" stroke-width="6" stroke-linecap="round"/>
  <line x1="196" y1="270" x2="316" y2="270" stroke="#514532" stroke-width="6" stroke-linecap="round"/>
  <line x1="188" y1="330" x2="324" y2="330" stroke="#514532" stroke-width="6" stroke-linecap="round"/>

  <!-- Pendulum arm (angled right) -->
  <line x1="256" y1="408" x2="326" y2="130"
        stroke="#FFB300"
        stroke-width="18"
        stroke-linecap="round"/>

  <!-- Pendulum weight -->
  <rect x="307" y="244" width="52" height="30" rx="6" fill="#FFB300"/>

  <!-- Base bar -->
  <rect x="124" y="404" width="264" height="32" rx="8" fill="#FFB300"/>

  <!-- Apex dot -->
  <circle cx="256" cy="100" r="14" fill="#FFB300"/>
</svg>
